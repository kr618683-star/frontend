<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fun Quiz Time!</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🎉 Fun Quiz Time! 🎉</h1>
    <div id="noQuestions" class="hidden">
      <h2>📚 Questions Not Available</h2>
      <p>Please ask a teacher to add some questions first!</p>
    </div>
    <div id="quizContent">
      <h2>🧠 Quiz Time!</h2>
      <div id="questionContainer">
        <p id="questionNumber" class="question-number"></p>
        <p id="questionText"></p>
        <div class="options">
          <button class="option" data-option="1"></button>
          <button class="option" data-option="2"></button>
          <button class="option" data-option="3"></button>
          <button class="option" data-option="4"></button>
        </div>
        <div id="feedbackMessage" class="hidden"></div>
        <button id="actionBtn" disabled>Submit Answer ✅</button>
      </div>
      <div id="result" class="hidden">
        <h3>🎊 Quiz Complete! 🎊</h3>
        <p>Your score: <span id="score"></span></p>
        <button id="restartBtn">Play Again! 🔄</button>
      </div>
    </div>
  </div>

  <script src="quiz.js"></script>
</body>
</html>
