<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Panel - Add Questions</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>👨‍🏫 Teacher Panel</h1>
    <h2>➕ Add New Question</h2>
    <form id="questionForm">
      <input type="text" id="question" placeholder="Question" required>
      <input type="text" id="option1" placeholder="Option 1" required>
      <input type="text" id="option2" placeholder="Option 2" required>
      <input type="text" id="option3" placeholder="Option 3" required>
      <input type="text" id="option4" placeholder="Option 4" required>
      <input type="text" id="correct" placeholder="Correct Answer (1-4)" required>
      <button type="submit" class="submit-btn">Add Question! 🎯</button>
    </form>
    <div id="message"></div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
